<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM ERROR 404 | GBUD.DIGITAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --bg: #050505;
            --glow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        /* Фонова сітка */
        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.5; }

        .terminal-box {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid var(--primary);
            padding: 50px 30px;
            border-radius: 8px;
            box-shadow: var(--glow);
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        .terminal-box::before {
            content: "[ ALERT ]";
            position: absolute; top: 10px; left: 15px;
            font-size: 0.7rem; color: red; animation: blink 1s infinite;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(4rem, 15vw, 8rem);
            color: var(--primary);
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: var(--glow);
        }

        .error-desc {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .sys-msg {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 40px;
        }

        .btn-cta {
            display: inline-block; padding: 15px 30px; border: 1px solid var(--primary);
            color: var(--primary); font-family: 'Orbitron', sans-serif; font-weight: 700;
            text-decoration: none; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s; background: transparent; cursor: pointer;
        }
        .btn-cta:hover { background: var(--primary); color: #000; box-shadow: var(--glow); transform: scale(1.05); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .scanline {
            width: 100%; height: 2px; background: var(--primary);
            position: absolute; top: 0; left: 0; opacity: 0.3;
            animation: scan 3s linear infinite; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="scanline"></div>

    <div class="terminal-box">
        <h1>404</h1>
        <div class="error-desc">Сектор не знайдено</div>
        <div class="sys-msg">Об'єкт за цією адресою відсутній у базі GBUD. Можливо, посилання було змінено або введено з помилкою.</div>
        <a href="index.html" class="btn-cta">[ ПОВЕРНУТИСЯ НА ГОЛОВНУ ]</a>
    </div>

    <script>
        // Анімація точок на фоні
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, dots = [];

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        for(let i=0; i<50; i++) dots.push({ x: Math.random()*width, y: Math.random()*height, vx: (Math.random()-0.5)*0.2, vy: (Math.random()-0.5)*0.2 });

        function draw() {
            ctx.clearRect(0,0,width,height);
            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)'; ctx.strokeStyle = 'rgba(255, 215, 0, 0.05)';
            dots.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                if(d.x<0 || d.x>width) d.vx*=-1; if(d.y<0 || d.y>height) d.vy*=-1;
                ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill();
            });
            for(let i=0; i<dots.length; i++) {
                for(let j=i+1; j<dots.length; j++) {
                    if(Math.hypot(dots[i].x - dots[j].x, dots[i].y - dots[j].y) < 150) { 
                        ctx.beginPath(); ctx.moveTo(dots[i].x, dots[i].y); ctx.lineTo(dots[j].x, dots[j].y); ctx.stroke(); 
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>

</body>
</html>
